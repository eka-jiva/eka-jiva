<!DOCTYPE html>
<html>
<head>
    <title>Observations</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="banner obs-banner">
    <div class="banner-content">
        <h1>Observations</h1>
        <p>Behaviour • Environment • Data</p>
    </div>
</div>

<section>

<h2 style="text-align:center;">Field Observations Database</h2>

<div class="card">
    <p>This is a live dataset of behavioural observations across environments.</p>
</div>

<div class="card">

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="loadView('view1')">Spider</button>
    <button onclick="loadView('view2')">Mountain</button>
    <button onclick="loadView('view3')">High Wind</button>
</div>

<iframe src="https://www.notion.so/7196b3ad6b584a6ebc6acd2e4136531c?v=da4ab8a51ac4427eac1c320f12c969b9&source=copy_link"
        width="100%" height="500" style="border:none;">
</iframe>

</div>

<script>
function loadView(view) {
    let iframe = document.querySelector("iframe");

    if (view === "view1") {
        iframe.src = "PUT_REAL_LINK_1";
    }
    if (view === "view2") {
        iframe.src = "PUT_REAL_LINK_2";
    }
    if (view === "view3") {
        iframe.src = "PUT_REAL_LINK_3";
    }
}
</script>

</section>

</body>
</html>
